spring.application.name=ai-assistant-rag
server.port=8080

# ============================================
# 大模型配置 (选择其中一种)
# ============================================

## 选项1: OpenAI (默认)
## 模型可选: gpt-4o-mini (推荐，便宜), gpt-4o, gpt-3.5-turbo
ai.openai.api-key=${OPENAI_API_KEY:your-api-key-here}
ai.openai.model=${OPENAI_MODEL:gpt-4o-mini}
ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

## 选项2: Moonshot (月之暗面 - 国内模型)
## 模型可选: moonshot-v1-8k, moonshot-v1-32k, moonshot-v1-128k
# ai.openai.api-key=${MOONSHOT_API_KEY:your-moonshot-key-here}
# ai.openai.model=${MOONSHOT_MODEL:moonshot-v1-8k}
# ai.openai.base-url=${MOONSHOT_BASE_URL:https://api.moonshot.cn/v1}

## 选项3: 阿里云百炼 (通义千问)
## 模型可选: qwen-turbo, qwen-plus, qwen-max
# ai.openai.api-key=${DASHSCOPE_API_KEY:your-dashscope-key-here}
# ai.openai.model=${DASHSCOPE_MODEL:qwen-turbo}
# ai.openai.base-url=${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}

## 选项4: DeepSeek
## 模型可选: deepseek-chat, deepseek-coder
# ai.openai.api-key=${DEEPSEEK_API_KEY:your-deepseek-key-here}
# ai.openai.model=${DEEPSEEK_MODEL:deepseek-chat}
# ai.openai.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}

## 选项5: 其他兼容 OpenAI API 格式的模型
# ai.openai.api-key=${CUSTOM_API_KEY:your-key-here}
# ai.openai.model=${CUSTOM_MODEL:your-model-name}
# ai.openai.base-url=${CUSTOM_BASE_URL:https://your-api-endpoint.com/v1}

# ============================================
# 向量数据库配置
# ============================================
ai.vector-db.path=${VECTOR_DB_PATH:./data/vector.db}

# ============================================
# Confluence 配置 (可选)
# ============================================
confluence.enabled=${CONFLUENCE_ENABLED:false}
confluence.base-url=${CONFLUENCE_BASE_URL:}
confluence.username=${CONFLUENCE_USERNAME:}
confluence.api-token=${CONFLUENCE_API_TOKEN:}
confluence.space-key=${CONFLUENCE_SPACE_KEY:}
confluence.max-results=${CONFLUENCE_MAX_RESULTS:10}
confluence.min-relevance-score=${CONFLUENCE_MIN_RELEVANCE_SCORE:0.5}

# ============================================
# 日志配置
# ============================================
logging.level.com.example.aiassistant=INFO
logging.level.dev.langchain4j=INFO
