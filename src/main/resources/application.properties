spring.application.name=ai-assistant-rag
server.port=8080

# ============================================
# 大模型配置
# ============================================

# 请配置你的 API Key (环境变量或修改下方值)
ai.openai.api-key=${OPENAI_API_KEY:your-api-key-here}
ai.openai.model=${OPENAI_MODEL:moonshot-v1-8k}
ai.openai.base-url=${OPENAI_BASE_URL:https://api.moonshot.cn/v1}

# ============================================
# 支持的模型配置示例 (取消注释对应配置即可使用)
# ============================================

## 1. Moonshot (月之暗面 Kimi) - 推荐国内使用
# ai.openai.api-key=${OPENAI_API_KEY:sk-your-moonshot-key}
# ai.openai.model=${OPENAI_MODEL:moonshot-v1-8k}
# ai.openai.base-url=${OPENAI_BASE_URL:https://api.moonshot.cn/v1}

## 2. DeepSeek
# ai.openai.api-key=${OPENAI_API_KEY:sk-your-deepseek-key}
# ai.openai.model=${OPENAI_MODEL:deepseek-chat}
# ai.openai.base-url=${OPENAI_BASE_URL:https://api.deepseek.com/v1}

## 3. OpenAI
# ai.openai.api-key=${OPENAI_API_KEY:sk-your-openai-key}
# ai.openai.model=${OPENAI_MODEL:gpt-4o-mini}
# ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

## 4. 阿里云百炼 (通义千问)
# ai.openai.api-key=${OPENAI_API_KEY:sk-your-dashscope-key}
# ai.openai.model=${OPENAI_MODEL:qwen-turbo}
# ai.openai.base-url=${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}

# ============================================
# 向量数据库配置
# ============================================
ai.vector-db.path=${VECTOR_DB_PATH:./data/vector.db}

# ============================================
# Confluence 配置 (可选)
# ============================================
confluence.enabled=${CONFLUENCE_ENABLED:false}
confluence.base-url=${CONFLUENCE_BASE_URL:}
confluence.username=${CONFLUENCE_USERNAME:}
confluence.api-token=${CONFLUENCE_API_TOKEN:}
confluence.space-key=${CONFLUENCE_SPACE_KEY:}
confluence.max-results=${CONFLUENCE_MAX_RESULTS:10}
confluence.min-relevance-score=${CONFLUENCE_MIN_RELEVANCE_SCORE:0.5}

# ============================================
# 日志配置
# ============================================
logging.level.com.example.aiassistant=INFO
logging.level.dev.langchain4j=INFO
